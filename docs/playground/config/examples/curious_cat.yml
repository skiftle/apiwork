title: Representation Types
description: Define typed attributes with object shapes, arrays, named types, and derived methods
order: 12

sections:
  - title: API Definition
    files:
      - config/apis/curious_cat.rb
  - title: Models
    files:
      - app/models/curious_cat/profile.rb
  - title: Representations
    files:
      - app/representations/curious_cat/profile_representation.rb
  - title: Contracts
    files:
      - app/contracts/curious_cat/profile_contract.rb
  - title: Controllers
    files:
      - app/controllers/curious_cat/profiles_controller.rb

scenarios:
  - title: Create a profile
    description: Create a profile with settings, tags, and addresses
    order: 1
    method: POST
    path: /curious_cat/profiles
    body:
      profile:
        name: Alice
        email: alice@example.com
        settings:
          theme: dark
          language: en
        tags:
          - developer
          - typescript
        primary_address:
          street: 123 Main St
          city: Stockholm
          zip: "12345"
        addresses:
          - street: 123 Main St
            city: Stockholm
            zip: "12345"
          - street: 456 Oak Ave
            city: Gothenburg
            zip: "41101"

  - title: Update profile settings
    description: Update settings and tags on an existing profile
    order: 2
    method: PATCH
    path: /curious_cat/profiles/:id
    setup:
      - create: profile
        fields:
          name: Alice
          email: alice@example.com
          settings:
            theme: dark
            language: en
          tags:
            - developer
          primary_address:
            street: 123 Main St
            city: Stockholm
            zip: "12345"
          addresses:
            - street: 123 Main St
              city: Stockholm
              zip: "12345"
    body:
      profile:
        settings:
          theme: light
          language: sv
        tags:
          - developer
          - ruby
          - rails
